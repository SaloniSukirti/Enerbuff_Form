<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enerbuff Partnership Survey</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#000000,#0f172a);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
color:white;
}

.container{
width:100%;
max-width:500px;
background:#111;
border-radius:18px;
overflow:hidden;
box-shadow:0 20px 45px rgba(0,0,0,0.6);
border:1px solid #1f2937;
}

.header{
background:linear-gradient(135deg,#000000,#065f46);
padding:30px;
text-align:center;
}

.header h1{
font-size:32px;
color:#22c55e;
letter-spacing:1px;
}

.header p{
font-size:14px;
margin-top:8px;
color:#9ca3af;
}

.form-box{
padding:30px;
}

.section-title{
font-size:20px;
margin-bottom:8px;
color:#22c55e;
}

.section-subtitle{
font-size:14px;
color:#9ca3af;
margin-bottom:22px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
font-size:14px;
color:#e5e7eb;
}

select,input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #374151;
background:#000;
color:white;
font-size:15px;
}

select:focus,input:focus{
outline:none;
border-color:#22c55e;
box-shadow:0 0 6px #22c55e55;
}

.note{
background:#022c22;
border-left:4px solid #22c55e;
padding:12px;
border-radius:6px;
font-size:13px;
margin-bottom:20px;
color:#a7f3d0;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:black;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:linear-gradient(135deg,#16a34a,#15803d);
transform:translateY(-1px);
}

.footer{
text-align:center;
font-size:12px;
color:#6b7280;
margin-top:18px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>ENERBUFF</h1>
<p>Energy Innovation & Industry Collaboration Survey</p>
</div>

<div class="form-box">

<div class="section-title">Partner With Us</div>
<div class="section-subtitle">
Share your details so we can explore collaboration opportunities with Enerbuff.
</div>

<div class="note">
Your responses help Enerbuff connect with energy leaders, innovators, and institutions.
</div>

<form action="https://docs.google.com/forms/d/e/1FAIpQLScabXg9S6fTL15WG_7NDxoc0Z_6m2DQRAwmGx9Y0i0sSMEYsQ/formResponse" method="POST" target="_blank">

<div class="form-group">
<label>Are you a member of any Indian Electrical Government Entity?</label>
<select name="entry.1156839308" required>
<option value="">Select option</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Are you a member of any other country's Electrical Government Entity?</label>
<select name="entry.227165865" required>
<option value="">Select option</option>
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Would you like to work with Enerbuff?</label>
<select name="entry.783682654" required>
<option value="">Select option</option>
<option value="Yes, Definitely">Yes, Definitely</option>
<option value="Maybe">Maybe</option>
<option value="No">No</option>
</select>
</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="entry.1731026742" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Company / Organization</label>
<input type="text" name="entry.1530582839" placeholder="Enter organization" required>
</div>

<button type="submit">Submit Survey</button>

</form>

<div class="footer">
© 2026 Enerbuff • Energy Collaboration Platform
</div>

</div>

</div>

</body>
</html>
